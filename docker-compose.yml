services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sports_strategy_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://sports:sports@postgres:5432/sports_strategy
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: sports_strategy_postgres
    environment:
      POSTGRES_DB: sports_strategy
      POSTGRES_USER: sports
      POSTGRES_PASSWORD: sports
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports -d sports_strategy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

